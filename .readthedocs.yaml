# Read the Docs configuration for FlareInspect Sphinx docs
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  apt_packages:
    - libcairo2-dev
    - libjpeg-dev
    - libpango1.0-dev
    - libgif-dev
    - build-essential
    - g++
  jobs:
    post_create_environment:
      - python -m pip install --upgrade pip
      - python -m pip install -r docs/requirements.txt
    pre_build:
      - python -m pip install -r docs/requirements.txt

sphinx:
  builder: html
  configuration: docs/conf.py
  fail_on_warning: false

python:
  install:
    - requirements: docs/requirements.txt
