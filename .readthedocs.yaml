# Read the Docs configuration
# See https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  apt_packages:
    - libcairo2-dev
    - libjpeg-dev
    - libpango1.0-dev
    - libgif-dev
    - build-essential
    - g++
  jobs:
    post_create_environment:
      - pip install --upgrade pip
      - pip install -q mkdocs-material "mkdocs-material[imaging]"
    pre_build:
      - pip install -q mkdocs-material "mkdocs-material[imaging]"

mkdocs:
  configuration: docs/mkdocs.yml
  fail_on_warning: false
