site_name: FlareInspect
site_url: https://flareinspect.readthedocs.io
site_description: Cloudflare security assessment CLI and web dashboard by IONSEC.IO
site_author: IONSEC.IO
repo_url: https://github.com/ionsec/flareinspect
repo_name: ionsec/flareinspect
edit_uri: edit/main/docs/docs/

theme:
  name: material
  logo: assets/flare-inspect-logo.svg
  favicon: assets/flare-inspect-logo.svg
  language: en
  palette:
    # ── Light mode: Cloudflare-inspired warm white ──
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # ── Dark mode: IONSEC × FlareInspect dark navy ──
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.s prune
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - content.action.view
    - toc.integrate
    - announcements.dismiss

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ionsec/flareinspect
    - icon: fontawesome/solid/globe
      link: https://ionsec.io
  generator: false

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.critic
  - pymdownx.case
  - pymdownx.tilde
  - md_in_html
  - tables
  - meta
  - def_list

plugins:
  - search:
      lang: en
      prebuild_index: true
      separator: '[\s\-,:!=\[\]()"/\\]+|(^|\-)(\w)+\s'
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true
      cache_safe: true

